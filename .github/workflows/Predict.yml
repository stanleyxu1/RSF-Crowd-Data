name: Predict Occupancy
on:
  push:
    branches:
      data-branch
    paths:
      - 'RSF_Dataset.csv'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout main branch
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Pull latest dataset from data-branch
      run: |
        git fetch origin data-branch
        # merge only the CSV into main
        git checkout origin/data-branch -- RSF_Dataset.csv

    - name: Run prediction
      run: python models/Model_Predict.py

    - name: Generate graph
      run: python make_graph.py

    - name: Commit and push results to main
      run: |
        git config user.name "GitHub Action"
        git config user.email "action@github.com"

        git checkout main  # ensure we are on main

        git add README.md crowd_graph.png RSF_Dataset.csv models/*.pkl

        git commit -m "Last Predicted: $(date)" || echo "No changes"

        git push origin main