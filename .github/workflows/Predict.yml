name: Predict Occupancy
on:
  push:
    branches:
      - data-branch
    paths:
      - 'RSF_Dataset.csv'
  workflow_dispatch:

concurrency:
  group: main-branch-writes
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Pull latest data from data-branch
        run: |
          git fetch origin data-branch
          git checkout origin/data-branch -- RSF_Dataset.csv

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run prediction
        run: python models/Model_Predict.py

      - name: Generate graph
        run: python make_graph.py

      - name: Commit results to main
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add README.md crowd_graph.png models/*.pkl RSF_Dataset.csv
          git commit -m "Update predictions: $(date)" || echo "No changes"
          git push origin main