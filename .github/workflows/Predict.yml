name: Predict Occupancy
on:
  push:
    branches:
      - data-branch
    paths:
      - 'RSF_Dataset.csv'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  run:
    runs-on: ubuntu-latest
    steps:

    # Step 1: Checkout data-branch
    - name: Checkout data-branch
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: data-branch

    # Step 2: Set up Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    # Step 3: Install dependencies
    - name: Install dependencies
      run: pip install -r requirements.txt

    # Step 4: Run predictions on data-branch
    - name: Run prediction
      run: python models/Model_Predict.py

    # Step 5: Generate graph
    - name: Generate graph
      run: python make_graph.py

    # Step 6: Commit predictions to data-branch
    - name: Commit predictions to data-branch
      run: |
        git config user.name "GitHub Action"
        git config user.email "action@github.com"
        git add README.md crowd_graph.png models/*.pkl
        git commit -m "Update predictions: $(date)" || echo "No changes"
        git push origin data-branch

    # Step 7: Merge only README.md into main
    - name: Merge README.md to main
      run: |
        git fetch origin main
        git checkout main
        git checkout data-branch -- README.md
        git commit -m "Sync predictions from data-branch: $(date)" || echo "No changes"
        git push origin main