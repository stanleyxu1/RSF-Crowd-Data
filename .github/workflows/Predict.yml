name: Predict Occupancy
on:
  push:
    branches:
      - data-branch
    paths:
      - 'RSF_Dataset.csv'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout data-branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: data-branch

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run prediction
        run: python models/Model_Predict.py

      - name: Generate graph
        run: python make_graph.py

      - name: Commit to data-branch
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add README.md crowd_graph.png models/*.pkl
          git commit -m "Update predictions: $(date) [skip ci]" || echo "No changes"
          git push origin data-branch

  update-main:
    runs-on: ubuntu-latest
    needs: predict
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Copy README and graph to main
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git fetch origin data-branch
          git checkout origin/data-branch -- README.md crowd_graph.png
          git add README.md crowd_graph.png
          git commit -m "Updated predictions from data-branch [skip ci]" || echo "No changes"
          git push origin main