name: Train Model
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - run: pip install -r requirements.txt
      - run: python models/Model_Train.py
      - run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add models/*.pkl
          git commit -m "Retrain models: $(date)" || exit 0
          git push