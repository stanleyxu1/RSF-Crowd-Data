name: Train Model
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: main-branch-writes
  cancel-in-progress: false

permissions:
  contents: write
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4

      - name: Pull latest data from data-branch
        run: |
          git fetch origin data-branch
          git checkout origin/data-branch -- RSF_Dataset.csv

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train model
        run: python models/Model_Train.py

      - name: Commit and push model updates
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          
          git add models/*.pkl
          
          git commit -m "Retrain models: $(date)" || exit 0
          
          # Merge main (not rebase) and accept data-branch's CSV version
          git pull origin main --no-rebase -X theirs
          git push origin main

      - name: Update data-branch with trained models
        run: |
          git fetch origin data-branch
          git checkout -b sync-models origin/data-branch
          
          # Bring in the newly trained .pkl files from main
          git checkout main -- models/*.pkl
          
          git add models/*.pkl
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          
          git commit -m "Sync trained models: $(date)" || exit 0
          git push origin sync-models:data-branch